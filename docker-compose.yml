name: observability

# Stack de observabilidade (LGTM + OTel + Pyroscope) para deploy no Coolify.
# Ponto de entrada da telemetria: OpenTelemetry Collector (OTLP em 4317/4318).
# Apenas o Grafana é exposto publicamente; o restante fica na rede interna.

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  # ---------------------------------------------------------------------------
  # OpenTelemetry Collector - recebe traces/metrics/logs via OTLP e distribui
  # ---------------------------------------------------------------------------
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.116.0
    restart: unless-stopped
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro
    ports:
      # Exponha estas portas somente se seus apps enviarem telemetria de fora
      # do Coolify. Dentro da mesma rede, use o hostname "otel-collector".
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
    depends_on:
      - tempo
      - loki
      - prometheus
    networks:
      - observability
    logging: *default-logging

  # ---------------------------------------------------------------------------
  # Prometheus - métricas (com remote-write receiver habilitado p/ o Collector)
  # ---------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:v3.1.0
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-remote-write-receiver"
      - "--web.enable-lifecycle"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    networks:
      - observability
    logging: *default-logging

  # ---------------------------------------------------------------------------
  # Loki - logs
  # ---------------------------------------------------------------------------
  loki:
    image: grafana/loki:3.3.2
    restart: unless-stopped
    command: ["-config.file=/etc/loki/loki-config.yaml"]
    volumes:
      - ./loki-config.yaml:/etc/loki/loki-config.yaml:ro
      - loki-data:/loki
    networks:
      - observability
    logging: *default-logging

  # ---------------------------------------------------------------------------
  # Tempo - traces
  # ---------------------------------------------------------------------------
  tempo:
    image: grafana/tempo:2.7.0
    restart: unless-stopped
    command: ["-config.file=/etc/tempo/tempo.yaml"]
    volumes:
      - ./tempo.yaml:/etc/tempo/tempo.yaml:ro
      - tempo-data:/var/tempo
    networks:
      - observability
    logging: *default-logging

  # ---------------------------------------------------------------------------
  # Pyroscope - profiling contínuo (serviço extra recomendado)
  # ---------------------------------------------------------------------------
  pyroscope:
    image: grafana/pyroscope:1.13.0
    restart: unless-stopped
    command: ["server"]
    volumes:
      - pyroscope-data:/data
    networks:
      - observability
    logging: *default-logging

  # ---------------------------------------------------------------------------
  # Grafana - visualização (único serviço exposto publicamente)
  # ---------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:11.5.0
    restart: unless-stopped
    environment:
      # No Coolify, defina o domínio via variável SERVICE_FQDN_GRAFANA_3000
      # ou configure o domínio pela UI apontando para a porta 3000.
      - GF_SERVER_ROOT_URL=${SERVICE_FQDN_GRAFANA:-http://localhost:3000}
      - GF_SECURITY_ADMIN_USER=${GF_SECURITY_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_FEATURE_TOGGLES_ENABLE=traceqlEditor
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
      - loki
      - tempo
      - pyroscope
    networks:
      - observability
    logging: *default-logging

networks:
  observability:
    driver: bridge

volumes:
  prometheus-data:
  loki-data:
  tempo-data:
  pyroscope-data:
  grafana-data:
